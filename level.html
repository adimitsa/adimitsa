<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level</title>

  <link rel="stylesheet" href="level.css">
  <link rel="stylesheet" href="process-card.css">
  <link rel="stylesheet" href="textarea.css">
  <link rel="stylesheet" href="window-card.css">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    /* Pin background after Tailwind preflight */
    html, body { background-color: #f8fafc !important; }

    /* --- THE FIX --- */
    /* Push the invisible movement container behind the cards so it doesn't block clicks */
    .textarea-container {
      z-index: 1;
    }
    /* Put both active elements above the canvas layer so they are clickable */
    .process-card {
      z-index: 10;
    }
    .window-3d-card {
      z-index: 10;
    }
  </style>

  <script src="process-card.js" defer></script>
  <script src="textarea.js" defer></script>
</head>
<body>

  <div class="level-canvas">

    <div class="process-card" id="main-process-card">
      <div class="card-header-zone">
        <textarea
          id="process-textarea"
          placeholder="New Process Header..."
          rows="1"
        ></textarea>
      </div>
      <div class="card-body-zone">
        <div class="image-placeholder-frame">
          <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          <span class="placeholder-label">Process Visualization Asset</span>
        </div>
      </div>
    </div>

    <div class="textarea-container">
      <div class="window-3d-card pt-2 pb-1 px-2">
        <textarea
          id="dynamic-textarea"
          placeholder="Functional unit"
          class="auto-textarea px-4 pt-3 pb-1 text-slate-900"
        ></textarea>
      </div>
    </div>

  </div>

</body>
</html>
